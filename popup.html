<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agile Task Automator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .container {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 500px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .content {
      padding: 24px;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .output-section {
      margin-top: 16px;
    }

    .output-label {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea {
      width: 100%;
      height: 240px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
      resize: vertical;
      color: #374151;
      background: #f9fafb;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .info-box {
      background: #ede9fe;
      border-left: 4px solid #667eea;
      padding: 12px;
      border-radius: 6px;
      margin-top: 16px;
      font-size: 12px;
      color: #5b21b6;
      line-height: 1.5;
    }

    .info-box strong {
      display: block;
      margin-bottom: 4px;
    }

    .status {
      padding: 8px 12px;
      background: #f0fdf4;
      color: #166534;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 12px;
      border-left: 3px solid #22c55e;
      display: none;
    }

    .status.error {
      background: #fef2f2;
      color: #991b1b;
      border-left-color: #ef4444;
    }

    .status.show {
      display: block;
    }

    .format-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .format-buttons button {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 Agile Task Automator</h1>
      <p>Converti task in documentazione tecnica</p>
    </div>

    <div class="content">
      <div class="action-buttons">
        <button class="btn-primary" id="captureBtn">
          📄 Cattura Task
        </button>
        <button class="btn-secondary" id="clearBtn">
          🗑️ Cancella
        </button>
      </div>

      <div class="format-buttons">
        <button class="btn-secondary" id="markdownBtn">Markdown</button>
        <button class="btn-secondary" id="htmlBtn">HTML</button>
      </div>

      <div class="output-section">
        <div class="output-label">📋 Documentazione Generata:</div>
        <textarea id="outputText" placeholder="Il task catturato apparirà qui..."></textarea>
      </div>

      <div class="status" id="status"></div>

      <div class="info-box">
        <strong>💡 Come usare:</strong>
        Apri una card su Trello/Jira, clicca "Cattura Task" e la documentazione tecnica verrà generata automaticamente.
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
