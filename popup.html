<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Agile Automator</title>
</head>
<body>
  <div class="main-area">
    <header>
      <h1>🚀 Agile Automator</h1>
    </header>
    
    <div class="input-container">
      <textarea id="rawInput" placeholder="Incolla qui i tuoi appunti o il testo grezzo da Trello/Jira..."></textarea>
    </div>

    <div class="action-container">
      <button id="generateBtn" class="primary-btn">✨ Genera Documentazione</button>
    </div>

    <div class="output-wrapper">
      <div id="successLabel" class="output-label">📋 Documentazione Generata:</div>
      <div class="output-container">
        <textarea id="markdownOutput" readonly placeholder="Il risultato Markdown formattato apparirà qui..."></textarea>
      </div>
    </div>
  </div>

  <footer class="footer-area">
    <button id="copyBtn" class="outline-btn">📋 Copia negli Appunti</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
