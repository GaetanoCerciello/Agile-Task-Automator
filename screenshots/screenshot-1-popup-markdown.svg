<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <!-- Background Desktop -->
  <rect width="1280" height="800" fill="#f5f5f5"/>
  
  <!-- Chrome Browser Window -->
  <rect x="20" y="20" width="1240" height="760" fill="white" stroke="#ccc" stroke-width="1" rx="8"/>
  
  <!-- Browser Tab Bar -->
  <rect x="20" y="20" width="1240" height="40" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="40" y="45" font-family="Arial, sans-serif" font-size="14" fill="#333">
    ☐ Demo - Agile Task Automator Test
  </text>
  
  <!-- Browser Address Bar -->
  <rect x="20" y="60" width="1240" height="35" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="83" font-family="Monaco, monospace" font-size="12" fill="#666">
    file:///Users/producer/agile-task-automator/test-demo.html
  </text>
  
  <!-- Main Content Area -->
  <rect x="20" y="95" width="800" height="685" fill="#ffffff"/>
  
  <!-- Demo Page Content (Left side) -->
  <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">
    🚀 Agile Task Demo
  </text>
  
  <!-- Card Example -->
  <rect x="50" y="150" width="700" height="180" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2" rx="8"/>
  <text x="70" y="175" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f2937">
    Implementare autenticazione OAuth2
  </text>
  <text x="70" y="200" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">
    Aggiungiamo supporto OAuth2 per migliorare la sicurezza
  </text>
  
  <!-- Labels -->
  <rect x="70" y="215" width="80" height="24" fill="#dcfce7" rx="4"/>
  <text x="78" y="232" font-family="Arial, sans-serif" font-size="11" fill="#166534" font-weight="600">
    Security
  </text>
  
  <rect x="160" y="215" width="100" height="24" fill="#fee2e2" rx="4"/>
  <text x="168" y="232" font-family="Arial, sans-serif" font-size="11" fill="#991b1b" font-weight="600">
    High Priority
  </text>
  
  <!-- Chrome Extension Popup (Right side) -->
  <rect x="850" y="100" width="400" height="650" fill="white" stroke="#999" stroke-width="2" rx="8" box-shadow="0 10px 40px rgba(0,0,0,0.3)"/>
  
  <!-- Popup Header -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="850" y="100" width="400" height="70" fill="url(#grad1)" rx="8"/>
  <text x="1050" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">
    🚀 Agile Task Automator
  </text>
  <text x="1050" y="150" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9" text-anchor="middle">
    Converti task in documentazione
  </text>
  
  <!-- Popup Buttons -->
  <rect x="870" y="180" width="160" height="36" fill="#667eea" stroke="none" rx="6"/>
  <text x="950" y="204" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">
    📄 Cattura Task
  </text>
  
  <rect x="1050" y="180" width="160" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="6"/>
  <text x="1130" y="204" font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle" font-weight="600">
    🗑️ Cancella
  </text>
  
  <!-- Format Buttons -->
  <rect x="870" y="225" width="160" height="32" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="6"/>
  <text x="950" y="246" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle" font-weight="600">
    Markdown
  </text>
  
  <rect x="1050" y="225" width="160" height="32" fill="#f3f4f6" stroke="#ddd" stroke-width="1" rx="6"/>
  <text x="1130" y="246" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle" font-weight="600">
    HTML
  </text>
  
  <!-- Output Textarea Label -->
  <text x="870" y="272" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#6b7280">
    📋 DOCUMENTAZIONE GENERATA:
  </text>
  
  <!-- Output Textarea -->
  <rect x="870" y="280" width="360" height="280" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" rx="4"/>
  
  <!-- Markdown Output Text -->
  <text x="885" y="300" font-family="Monaco, monospace" font-size="10" fill="#374151" font-weight="bold">
    # Implementare autenticazione OAuth2
  </text>
  <text x="885" y="318" font-family="Monaco, monospace" font-size="9" fill="#667eea" font-weight="600">
    **Fonte:** TRELLO | **Data:** 29/03/2026
  </text>
  <text x="885" y="335" font-family="Monaco, monospace" font-size="9" fill="#374151">
    ---
  </text>
  <text x="885" y="352" font-family="Monaco, monospace" font-size="10" fill="#374151" font-weight="bold">
    ## 📋 Descrizione
  </text>
  <text x="885" y="368" font-family="Monaco, monospace" font-size="9" fill="#6b7280">
    Aggiungiamo supporto OAuth2 all'API gateway...
  </text>
  <text x="885" y="384" font-family="Monaco, monospace" font-size="10" fill="#374151" font-weight="bold">
    ## 👤 User Story
  </text>
  <text x="885" y="400" font-family="Monaco, monospace" font-size="9" fill="#6b7280">
    Come developer
  </text>
  <text x="885" y="415" font-family="Monaco, monospace" font-size="9" fill="#6b7280">
    Voglio OAuth2 auth
  </text>
  <text x="885" y="430" font-family="Monaco, monospace" font-size="9" fill="#6b7280">
    Affinché API sia sicura
  </text>
  <text x="885" y="446" font-family="Monaco, monospace" font-size="10" fill="#374151" font-weight="bold">
    ## ✅ Acceptance Criteria
  </text>
  <text x="885" y="462" font-family="Monaco, monospace" font-size="9" fill="#6b7280">
    - [ ] API accetta OAuth2 tokens
  </text>
  <text x="885" y="478" font-family="Monaco, monospace" font-size="9" fill="#6b7280">
    - [ ] Validazione token funziona
  </text>
  <text x="885" y="494" font-family="Monaco, monospace" font-size="9" fill="#6b7280">
    - [ ] Errori gestiti correttamente
  </text>
  <text x="885" y="510" font-family="Monaco, monospace" font-size="9" fill="#6b7280">
    - [ ] Documentazione completata
  </text>
  <text x="885" y="526" font-family="Monaco, monospace" font-size="10" fill="#374151" font-weight="bold">
    ## 🛠️ Note Tecniche
  </text>
  <text x="885" y="542" font-family="Monaco, monospace" font-size="9" fill="#6b7280">
    - Stack: Node.js, Express, JWT
  </text>
  
  <!-- Status Message -->
  <rect x="870" y="570" width="360" height="40" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" rx="4"/>
  <text x="885" y="595" font-family="Arial, sans-serif" font-size="12" fill="#166534" font-weight="600">
    ✅ Task catturato con successo!
  </text>
  
  <!-- Info Box -->
  <rect x="870" y="620" width="360" height="60" fill="#ede9fe" stroke="#d8b4fe" stroke-width="1" rx="4"/>
  <text x="885" y="638" font-family="Arial, sans-serif" font-size="11" fill="#5b21b6" font-weight="600">
    💡 Come usare: Apri una card su Trello/Jira,
  </text>
  <text x="885" y="655" font-family="Arial, sans-serif" font-size="11" fill="#5b21b6">
    clicca "Cattura Task" e ottieni documentazione
  </text>
  <text x="885" y="672" font-family="Arial, sans-serif" font-size="11" fill="#5b21b6">
    tecnica pronta per Slack o archivio.
  </text>
  
  <!-- Label: Screenshot 1 -->
  <text x="50" y="780" font-family="Arial, sans-serif" font-size="12" fill="#667eea" font-weight="bold">
    Screenshot 1: Popup con Task Catturato (Formato Markdown)
  </text>
</svg>